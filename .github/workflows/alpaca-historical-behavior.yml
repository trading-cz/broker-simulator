name: Alpaca Historical Behavior Probe

on:
  workflow_dispatch: {}

jobs:
  historical-behavior:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install alpaca-py

      - name: Run historical behavior probe
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          python .github/script/alpaca_historical_behavior.py 2>&1 | tee historical-behavior.log

      - name: Upload behavior log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alpaca-historical-behavior
          path: historical-behavior.log
          retention-days: 30
