name: Verify Alpaca Secrets Configuration

on:
  workflow_dispatch: {}

jobs:
  verify-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Reverse stored secrets back to original
        env:
          ALPACA_API_KEY_REVERSED: ${{ secrets.ALPACA_API_KEY_REVERSED }}
          ALPACA_SECRET_KEY_REVERSED: ${{ secrets.ALPACA_SECRET_KEY_REVERSED }}
        run: |
          echo "=== Reversing Secrets Back to Original Values ==="
          echo ""
          
          # Reverse ALPACA_API_KEY back to original using decrypt script
          if [ -z "$ALPACA_API_KEY_REVERSED" ]; then
            echo "⚠️  ALPACA_API_KEY_REVERSED is NOT set"
          else
            echo "✓ ALPACA_API_KEY (original - auto-masked):"
            python3 .github/script/decrypt_reversed.py "$ALPACA_API_KEY_REVERSED"
            echo ""
          fi
          
          # Reverse ALPACA_SECRET_KEY back to original using decrypt script
          if [ -z "$ALPACA_SECRET_KEY_REVERSED" ]; then
            echo "⚠️  ALPACA_SECRET_KEY_REVERSED is NOT set"
          else
            echo "✓ ALPACA_SECRET_KEY (original - auto-masked):"
            python3 .github/script/decrypt_reversed.py "$ALPACA_SECRET_KEY_REVERSED"
            echo ""
          fi
          
          echo "=== Secrets Successfully Reversed ==="
          echo "✓ Both secrets are now in their original form"
          echo "✓ GitHub automatically masks the original values in logs"
