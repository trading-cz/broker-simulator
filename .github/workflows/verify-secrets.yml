name: Verify Alpaca Secrets Configuration

on:
  workflow_dispatch: {}

jobs:
  verify-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify secret variables are loaded
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          echo "=== Verifying Alpaca Secrets Configuration ==="
          
          # Check if secrets are set (GitHub auto-masks secrets in output)
          if [ -z "$ALPACA_API_KEY" ]; then
            echo "⚠️  ALPACA_API_KEY is NOT set"
          else
            echo "✓ ALPACA_API_KEY is loaded (length: ${#ALPACA_API_KEY})"
          fi
          
          if [ -z "$ALPACA_SECRET_KEY" ]; then
            echo "⚠️  ALPACA_SECRET_KEY is NOT set"
          else
            echo "✓ ALPACA_SECRET_KEY is loaded (length: ${#ALPACA_SECRET_KEY})"
          fi
          
          # Display secret values (GitHub will auto-mask them)
          echo ""
          echo "=== Secret Values (auto-masked by GitHub) ==="
          echo "ALPACA_API_KEY=$ALPACA_API_KEY"
          echo "ALPACA_SECRET_KEY=$ALPACA_SECRET_KEY"
